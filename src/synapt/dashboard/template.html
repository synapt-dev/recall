<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>synapt dashboard</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #8b5cf6;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
  header select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  #agents {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .tile {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
  }
  .tile-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .tile-role { color: var(--text-dim); font-size: 11px; margin-bottom: 4px; }
  .tile-meta { color: var(--text-dim); font-size: 11px; }
  .tile.empty { color: var(--text-dim); text-align: center; grid-column: 1 / -1; }
  #sse-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .msg { font-size: 13px; line-height: 1.5; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .msg .ts { color: var(--text-dim); font-size: 12px; }
  .msg b { font-weight: 600; }
  .msg.sys { color: var(--text-dim); font-size: 12px; }
  .msg.sys .sys-text { font-style: italic; }
  .msg.directive b { color: var(--orange); }
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #input-bar textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    line-height: 1.4;
  }
  #input-bar textarea:focus { border-color: var(--accent); }
  #input-bar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #input-bar button:hover { opacity: 0.9; }
</style>
</head>
<body>

<header>
  <h1>synapt dashboard</h1>
  <select id="channel-select" hx-get="/api/channels" hx-trigger="load" hx-swap="innerHTML">
    <option value="dev">#dev</option>
  </select>
</header>

<div id="sse-container" hx-ext="sse" sse-connect="/api/stream?channel=dev">
  <div id="agents" sse-swap="agents" hx-swap="innerHTML">
    <div class="tile empty">Loading agents...</div>
  </div>

  <div id="feed" sse-swap="messages" hx-swap="beforeend">
    <div class="msg sys"><span class="sys-text">Loading messages...</span></div>
  </div>
</div>

<div id="input-bar">
  <form id="post-form"
        hx-post="/api/post/dev"
        hx-swap="none"
        hx-on::after-request="this.querySelector('textarea').value = ''"
        style="display:flex; gap:8px; flex:1; align-items:flex-end">
    <input type="hidden" name="name" id="post-name" value="dashboard">
    <textarea name="message" placeholder="Message #dev... (Shift+Enter for newline)" autocomplete="off" autofocus
              rows="1" style="flex:1; resize:none; background:var(--bg); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:6px; font-family:inherit; font-size:13px; outline:none; max-height:120px; overflow-y:auto"></textarea>
    <button type="submit">Send</button>
  </form>
</div>

<script>
// Dashboard display name — prompt on first load, store in localStorage
let dashName = localStorage.getItem('synapt-dashboard-name');
if (!dashName) {
  dashName = prompt('Enter your display name for the dashboard:', 'Layne') || 'dashboard';
  localStorage.setItem('synapt-dashboard-name', dashName);
}

// Set name in form
document.getElementById('post-name').value = dashName;

// Load initial messages
htmx.ajax('GET', '/api/messages/dev?limit=50', '#feed');

// Populate channel selector
fetch('/api/channels').then(r => r.json()).then(channels => {
  const sel = document.getElementById('channel-select');
  sel.innerHTML = channels.map(c =>
    '<option value="' + c + '"' + (c === 'dev' ? ' selected' : '') + '>#' + c + '</option>'
  ).join('');
});

// Channel switching
document.getElementById('channel-select').addEventListener('change', function() {
  const ch = this.value;
  // Reconnect SSE
  const sse = document.getElementById('sse-container');
  sse.setAttribute('sse-connect', '/api/stream?channel=' + ch);
  htmx.process(sse);
  // Update form
  document.getElementById('post-form').setAttribute('hx-post', '/api/post/' + ch);
  htmx.process(document.getElementById('post-form'));
  // Update placeholder
  document.querySelector('#input-bar textarea').placeholder = 'Message #' + ch + '... (Shift+Enter for newline)';
  // Reload messages
  document.getElementById('feed').innerHTML = '';
  htmx.ajax('GET', '/api/messages/' + ch + '?limit=50', '#feed');
});

// Enter sends, Shift+Enter adds newline
const textarea = document.querySelector('#input-bar textarea');
textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (this.value.trim()) {
      htmx.trigger(document.getElementById('post-form'), 'submit');
    }
  }
});
// Auto-resize textarea
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Auto-scroll feed
const feed = document.getElementById('feed');
const observer = new MutationObserver(() => {
  feed.scrollTop = feed.scrollHeight;
});
observer.observe(feed, { childList: true });
</script>

</body>
</html>
