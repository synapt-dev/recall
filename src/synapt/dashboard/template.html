<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>synapt dashboard</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #8b5cf6;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ── Header ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: var(--accent); }
  #org-label { font-size: 12px; color: var(--text-dim); }
  #org-label span { color: var(--text); font-weight: 600; }

  /* ── 3-column layout ─────────────────────────────────── */
  .layout {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebars ─────────────────────────────────────────── */
  .sidebar {
    width: 192px;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-left { border-right: 1px solid var(--border); }
  .sidebar-right { border-left: 1px solid var(--border); }

  .sidebar-header {
    padding: 10px 12px 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  /* ── Channel list ─────────────────────────────────────── */
  .ch-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    margin: 1px 6px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    user-select: none;
    transition: background 0.1s;
  }
  .ch-item:hover { background: rgba(139,92,246,0.1); color: var(--text); }
  .ch-item.active {
    background: rgba(139,92,246,0.18);
    color: var(--accent);
    font-weight: 600;
  }
  .ch-item::before { content: '#'; opacity: 0.5; font-size: 11px; }
  .ch-item.active::before { opacity: 1; color: var(--accent); }

  /* ── Agent tiles (right sidebar) ─────────────────────── */
  #agents { display: flex; flex-direction: column; gap: 0; padding: 4px 6px; }
  .tile {
    background: var(--bg);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .tile-name { font-weight: 600; font-size: 13px; margin-bottom: 1px; }
  .tile-project { color: var(--accent); font-size: 10px; opacity: 0.7; margin-bottom: 2px; }
  .tile-role { color: var(--text-dim); font-size: 11px; margin-bottom: 3px; }
  .tile-meta { color: var(--text-dim); font-size: 11px; line-height: 1.4; }
  .tile.empty { color: var(--text-dim); text-align: center; padding: 16px 10px; }
  .tile.clickable { cursor: pointer; transition: border-color 0.15s; border: 1px solid transparent; }
  .tile.clickable:hover { border-color: var(--accent); }
  .tile.clickable.selected { border-color: var(--accent); background: rgba(139,92,246,0.08); }

  /* ── Main panel ───────────────────────────────────────── */
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Channel header bar ───────────────────────────────── */
  #channel-header {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #channel-header .ch-hash { color: var(--accent); font-size: 15px; }

  /* ── SSE container ────────────────────────────────────── */
  #sse-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* ── Messages ─────────────────────────────────────────── */
  .msg { font-size: 13px; line-height: 1.5; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .msg .ts { color: var(--text-dim); font-size: 12px; }
  .msg b { font-weight: 600; }
  .msg p { margin: 3px 0; }
  .msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 { font-size: 13px; font-weight: 700; margin: 4px 0 2px; }
  .msg code { background: rgba(139,92,246,0.12); padding: 2px 6px; border-radius: 3px; font-size: 12px; color: #c4b5fd; }
  .msg pre { background: #141420; border: 1px solid var(--border); padding: 10px 14px; border-radius: 6px; margin: 6px 0; overflow-x: auto; line-height: 1.5; }
  .msg pre code { padding: 0; background: none; color: var(--text); }
  .msg strong { color: inherit; }
  .msg ul, .msg ol { margin: 6px 0 6px 24px; line-height: 1.6; }
  .msg li { margin: 2px 0; }
  .msg table { border-collapse: collapse; margin: 6px 0; font-size: 12px; width: auto; }
  .msg th, .msg td { border: 1px solid var(--border); padding: 4px 10px; text-align: left; }
  .msg th { background: var(--surface); font-weight: 600; }
  .msg blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 6px 0; color: var(--text-dim); }
  .msg.sys { color: var(--text-dim); font-size: 12px; }
  .msg.sys .sys-text { font-style: italic; }
  .msg.directive b { color: var(--orange); }
  .attachments { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
  .attachment-link { color: var(--accent); text-decoration: none; }
  .attachment-image { max-width: min(420px, 100%); max-height: 320px; display: block; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }

  /* ── Agent input panel ────────────────────────────────── */
  #agent-input-panel {
    display: none;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #agent-input-panel.active { display: flex; gap: 8px; align-items: flex-end; }
  #agent-input-panel .agent-target { font-size: 12px; font-weight: 600; color: var(--accent); white-space: nowrap; align-self: center; }
  #agent-input-panel input[type="text"] {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); padding: 8px 12px;
    border-radius: 6px; font-family: inherit; font-size: 13px; outline: none;
  }
  #agent-input-panel input[type="text"]:focus { border-color: var(--accent); }
  #agent-input-panel button {
    background: var(--accent); color: white; border: none;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600;
  }

  /* ── Agent output panel ───────────────────────────────── */
  #agent-output-panel {
    display: none;
    background: #141420;
    border-top: 1px solid var(--border);
    max-height: 220px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.5;
    flex-shrink: 0;
  }
  #agent-output-panel.active { display: block; }
  #agent-output-panel .output-header {
    padding: 5px 16px;
    font-weight: 600;
    font-size: 11px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
  }
  #agent-output-content { padding: 8px 16px; white-space: pre-wrap; font-family: inherit; color: var(--text); }

  /* ── Input bar ────────────────────────────────────────── */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .upload-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  #attachment-name {
    color: var(--text-dim);
    font-size: 12px;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    align-self: center;
  }
  #input-bar textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    line-height: 1.4;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
  }
  #input-bar textarea:focus { border-color: var(--accent); }
  #input-bar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #input-bar button:hover { opacity: 0.9; }
</style>
</head>
<body>

<header>
  <h1>mission control</h1>
  <span id="org-label">loading&hellip;</span>
</header>

<div class="layout">

  <!-- Left sidebar: channels -->
  <div class="sidebar sidebar-left">
    <div class="sidebar-header">Channels</div>
    <div id="channel-list">
      <div class="ch-item active" data-ch="dev">dev</div>
    </div>
  </div>

  <!-- Main panel: messages + input -->
  <div class="main-panel">
    <div id="channel-header">
      <span class="ch-hash">#</span>
      <span id="channel-title">dev</span>
    </div>

    <div id="sse-container" hx-ext="sse" sse-connect="/api/stream?channel=dev">
      <div id="agent-input-panel">
        <span class="agent-target" id="agent-target-label">&rarr; agent</span>
        <input type="text" id="agent-input-text" placeholder="Send input to agent..." autocomplete="off">
        <button id="agent-input-send">Send</button>
      </div>

      <div id="agent-output-panel">
        <div class="output-header" id="agent-output-header">Terminal: agent</div>
        <div id="agent-output-content">No output yet.</div>
      </div>

      <div id="feed" sse-swap="messages" hx-swap="beforeend">
        <div class="msg sys"><span class="sys-text">Loading messages&hellip;</span></div>
      </div>
    </div>

    <div id="input-bar">
      <form id="post-form"
            hx-post="/api/post/dev"
            hx-encoding="multipart/form-data"
            hx-swap="none"
            hx-on::after-request="this.querySelector('textarea').value = ''; this.querySelector('#attachment-input').value=''; this.querySelector('#attachment-name').textContent='';"
            style="display:flex; gap:8px; flex:1; align-items:flex-end">
        <input type="hidden" name="name" id="post-name" value="dashboard">
        <input type="hidden" name="org" id="post-org" value="">
        <input type="hidden" name="project" id="post-project" value="">
        <label class="upload-label" for="attachment-input">&#128247;</label>
        <input id="attachment-input" type="file" name="attachment" accept="image/*" style="display:none">
        <span id="attachment-name"></span>
        <textarea name="message" id="message-input" placeholder="Message #dev&hellip; (Shift+Enter for newline)" autocomplete="off" autofocus rows="1"></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <!-- Right sidebar: agents -->
  <div class="sidebar sidebar-right">
    <div class="sidebar-header">Members</div>
    <div id="agents">
      <div class="tile empty">Loading&hellip;</div>
    </div>
  </div>

</div>

<script>
// ── Display name ─────────────────────────────────────────
let dashName = localStorage.getItem('synapt-dashboard-name');
if (!dashName) {
  dashName = prompt('Enter your display name:', 'Layne') || 'dashboard';
  localStorage.setItem('synapt-dashboard-name', dashName);
}
document.getElementById('post-name').value = dashName;

// ── Org/project label ────────────────────────────────────
fetch('/api/org').then(r => r.json()).then(data => {
  activeOrg = data.org || '';
  activeProject = data.project || '';
  document.getElementById('post-org').value = activeOrg;
  document.getElementById('post-project').value = activeProject;
  const lbl = document.getElementById('org-label');
  lbl.innerHTML = '<span>' + data.org + '</span> / ' + data.project;
}).catch(() => {
  document.getElementById('org-label').textContent = '';
});

// ── Active channel + org/project context ─────────────────
let activeChannel = 'dev';
let activeOrg = '';
let activeProject = '';

function switchChannel(ch, org, project) {
  activeChannel = ch;
  activeOrg = org || '';
  activeProject = project || '';

  // Update sidebar highlight
  document.querySelectorAll('.ch-item').forEach(el => {
    el.classList.toggle('active', el.dataset.ch === ch && el.dataset.org === activeOrg && el.dataset.proj === activeProject);
  });

  // Update channel title
  document.getElementById('channel-title').textContent = ch;

  // Build query string with org/project if set
  const q = new URLSearchParams({ channel: ch });
  if (activeOrg) q.set('org', activeOrg);
  if (activeProject) q.set('project', activeProject);

  // Reconnect SSE
  const sse = document.getElementById('sse-container');
  sse.setAttribute('sse-connect', '/api/stream?' + q.toString());
  htmx.process(sse);

  // Update post form target + hidden org/project fields
  const form = document.getElementById('post-form');
  form.setAttribute('hx-post', '/api/post/' + ch);
  document.getElementById('post-org').value = activeOrg;
  document.getElementById('post-project').value = activeProject;
  htmx.process(form);

  // Update placeholder
  document.getElementById('message-input').placeholder = 'Message #' + ch + '\u2026 (Shift+Enter for newline)';

  // Join the channel
  ensureDashboardJoin(ch);

  // Reload messages
  const msgQ = new URLSearchParams({ limit: '50' });
  if (activeOrg) msgQ.set('org', activeOrg);
  if (activeProject) msgQ.set('project', activeProject);
  document.getElementById('feed').innerHTML = '';
  htmx.ajax('GET', '/api/messages/' + ch + '?' + msgQ.toString(), '#feed');
}

// ── Channel list population (org/project hierarchy) ───────
function renderChannelList(nav) {
  const list = document.getElementById('channel-list');
  // nav = { org, project, projects: [{org, project, channels, active}] }
  const projects = (nav && nav.projects) ? nav.projects : [];

  // Set initial activeOrg/activeProject from current project
  if (!activeOrg && nav && nav.org) { activeOrg = nav.org; activeProject = nav.project || ''; }

  let html = '';
  projects.forEach(p => {
    const isCurrentProject = p.active;
    // Show project header only if multiple projects exist
    if (projects.length > 1) {
      const label = (p.org !== nav.org) ? p.org + '/' + p.project : p.project;
      html += '<div style="padding:8px 10px 2px; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em; opacity:0.7;">' + label + '</div>';
    }
    p.channels.forEach(c => {
      const isActive = (c === activeChannel && p.org === activeOrg && p.project === activeProject);
      html += '<div class="ch-item' + (isActive ? ' active' : '') +
              '" data-ch="' + c + '" data-org="' + p.org + '" data-proj="' + p.project + '">' + c + '</div>';
    });
  });
  if (!html) html = '<div style="padding:8px 10px; font-size:12px; color:var(--text-dim);">No channels</div>';
  list.innerHTML = html;
}

document.getElementById('channel-list').addEventListener('click', function(e) {
  const item = e.target.closest('.ch-item');
  if (item) switchChannel(item.dataset.ch, item.dataset.org, item.dataset.proj);
});

function refreshChannelList() {
  fetch('/api/nav').then(r => r.json()).then(renderChannelList).catch(() => {});
}
refreshChannelList();
setInterval(refreshChannelList, 30000);

// ── Join & initial load ───────────────────────────────────
function ensureDashboardJoin(channel) {
  return fetch('/api/join/' + channel, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ name: dashName }),
  });
}
ensureDashboardJoin('dev');
htmx.ajax('GET', '/api/messages/dev?limit=50', '#feed');

// ── Agents polling (SSE scope prevents sse-swap here) ────
function renderAgents(agents) {
  const container = document.getElementById('agents');
  if (!agents || !agents.length) {
    container.innerHTML = '<div class="tile empty">No agents online</div>';
    return;
  }
  const statusColors = { online: '#4ade80', idle: '#facc15', away: '#fb923c', offline: '#6b7280', running: '#4ade80' };
  container.innerHTML = agents.map(a => {
    const name = a.display_name || a.griptree || a.agent_id || '?';
    const color = statusColors[a.status] || '#6b7280';
    const role = (a.role && a.role !== 'agent') ? '<div class="tile-role">' + a.role + '</div>' : '';
    const project = a.griptree ? '<div class="tile-project">' + a.griptree + '</div>' : '';
    const channels = (a.channels && a.channels.length) ? a.channels.map(c => '#' + c).join(', ') : 'no channels';
    const seen = (a.last_seen && a.last_seen.length > 16) ? a.last_seen.substring(11, 16) : '';
    return '<div class="tile clickable" data-agent="' + name + '" style="border-left:4px solid ' + color + '">' +
           '<div class="tile-name">' + name + '</div>' + project + role +
           '<div class="tile-meta"><span style="color:' + color + '">' + a.status + '</span>' +
           ' &middot; ' + channels + (seen ? ' &middot; ' + seen : '') + '</div></div>';
  }).join('');
}

function refreshAgents() {
  fetch('/api/agents').then(r => r.json()).then(renderAgents).catch(() => {});
}
refreshAgents();
setInterval(refreshAgents, 5000);

// ── Enter sends, Shift+Enter newline ─────────────────────
const textarea = document.getElementById('message-input');
const attachmentInput = document.getElementById('attachment-input');
const attachmentName = document.getElementById('attachment-name');

textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (this.value.trim() || attachmentInput.files.length) {
      htmx.trigger(document.getElementById('post-form'), 'submit');
    }
  }
});
attachmentInput.addEventListener('change', function() {
  attachmentName.textContent = this.files.length ? this.files[0].name : '';
});
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Timestamp localization ────────────────────────────────
function localizeTimestamps(root) {
  root.querySelectorAll('.ts[data-utc]').forEach(el => {
    const utc = el.getAttribute('data-utc');
    if (!utc || el.dataset.localized) return;
    try {
      const d = new Date(utc.endsWith('Z') ? utc : utc + 'Z');
      if (!isNaN(d)) {
        el.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        el.dataset.localized = '1';
      }
    } catch(e) {}
  });
}
localizeTimestamps(document);

// ── Auto-scroll + timestamp localization ─────────────────
const feed = document.getElementById('feed');
const observer = new MutationObserver(() => {
  localizeTimestamps(feed);
  feed.scrollTop = feed.scrollHeight;
});
observer.observe(feed, { childList: true, subtree: true });

// ── Agent input panel ─────────────────────────────────────
let selectedAgent = null;
const agentPanel = document.getElementById('agent-input-panel');
const agentLabel = document.getElementById('agent-target-label');
const agentInput = document.getElementById('agent-input-text');
const agentSendBtn = document.getElementById('agent-input-send');

document.getElementById('agents').addEventListener('click', function(e) {
  const tile = e.target.closest('.tile');
  if (!tile || tile.classList.contains('empty')) return;
  const name = tile.dataset.agent;
  if (!name) return;

  document.querySelectorAll('.tile.selected').forEach(t => t.classList.remove('selected'));
  if (selectedAgent === name) {
    selectedAgent = null;
    agentPanel.classList.remove('active');
    hideAgentOutput();
    return;
  }
  selectedAgent = name;
  tile.classList.add('selected');
  agentLabel.textContent = '\u2192 ' + name;
  agentPanel.classList.add('active');
  agentInput.focus();
  showAgentOutput(name);
});

function sendAgentInput() {
  if (!selectedAgent || !agentInput.value.trim()) return;
  fetch('/api/agent/' + selectedAgent + '/input', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ text: agentInput.value }),
  }).then(r => r.json()).then(data => {
    if (data.ok) agentInput.value = '';
  });
}
agentSendBtn.addEventListener('click', sendAgentInput);
agentInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); sendAgentInput(); }
});

// ── Agent output panel ────────────────────────────────────
const outputPanel = document.getElementById('agent-output-panel');
const outputHeader = document.getElementById('agent-output-header');
const outputContent = document.getElementById('agent-output-content');
let outputInterval = null;

function showAgentOutput(name) {
  outputHeader.textContent = 'Terminal: ' + name;
  outputPanel.classList.add('active');
  outputContent.textContent = 'Loading\u2026';
  if (outputInterval) clearInterval(outputInterval);
  function fetchSnapshot() {
    fetch('/api/agent/' + name + '/snapshot?lines=40')
      .then(r => r.json())
      .then(data => {
        if (data.content) {
          outputContent.textContent = data.content;
          outputPanel.scrollTop = outputPanel.scrollHeight;
        } else if (data.error) {
          outputContent.textContent = '(' + data.error + ')';
        }
      })
      .catch(() => { outputContent.textContent = '(not connected)'; });
  }
  fetchSnapshot();
  outputInterval = setInterval(fetchSnapshot, 2000);
}

function hideAgentOutput() {
  outputPanel.classList.remove('active');
  if (outputInterval) { clearInterval(outputInterval); outputInterval = null; }
}
</script>

</body>
</html>
