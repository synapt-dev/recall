<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>synapt dashboard</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #8b5cf6;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
  header select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  #agents {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .tile {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
  }
  .tile-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .tile-role { color: var(--text-dim); font-size: 11px; margin-bottom: 4px; }
  .tile-meta { color: var(--text-dim); font-size: 11px; }
  .tile.empty { color: var(--text-dim); text-align: center; grid-column: 1 / -1; }
  #sse-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .msg { font-size: 13px; line-height: 1.5; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .msg .ts { color: var(--text-dim); font-size: 12px; }
  .msg b { font-weight: 600; }
  .msg p { margin: 3px 0; }
  .msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 { font-size: 13px; font-weight: 700; margin: 4px 0 2px; }
  .msg code { background: rgba(139,92,246,0.12); padding: 2px 6px; border-radius: 3px; font-size: 12px; color: #c4b5fd; }
  .msg pre { background: #141420; border: 1px solid var(--border); padding: 10px 14px; border-radius: 6px; margin: 6px 0; overflow-x: auto; line-height: 1.5; }
  .msg pre code { padding: 0; background: none; color: var(--text); }
  .msg strong { color: inherit; }
  .msg ul, .msg ol { margin: 6px 0 6px 24px; line-height: 1.6; }
  .msg li { margin: 2px 0; }
  .msg table { border-collapse: collapse; margin: 6px 0; font-size: 12px; width: auto; }
  .msg th, .msg td { border: 1px solid var(--border); padding: 4px 10px; text-align: left; }
  .msg th { background: var(--surface); font-weight: 600; }
  .msg blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 6px 0; color: var(--text-dim); }
  .msg.sys { color: var(--text-dim); font-size: 12px; }
  .msg.sys .sys-text { font-style: italic; }
  .msg.directive b { color: var(--orange); }
  .attachments { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
  .attachment-link { color: var(--accent); text-decoration: none; }
  .attachment-image { max-width: min(420px, 100%); max-height: 320px; display: block; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }
  .upload-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  #attachment-name {
    color: var(--text-dim);
    font-size: 12px;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    align-self: center;
  }
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #input-bar textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    line-height: 1.4;
  }
  #input-bar textarea:focus { border-color: var(--accent); }
  #input-bar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #input-bar button:hover { opacity: 0.9; }
  /* Agent input panel */
  #agent-input-panel {
    display: none;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #agent-input-panel.active { display: flex; gap: 8px; align-items: flex-end; }
  #agent-input-panel .agent-target {
    font-size: 12px; font-weight: 600; color: var(--accent);
    white-space: nowrap; align-self: center;
  }
  #agent-input-panel input[type="text"] {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); padding: 8px 12px;
    border-radius: 6px; font-family: inherit; font-size: 13px; outline: none;
  }
  #agent-input-panel input[type="text"]:focus { border-color: var(--accent); }
  #agent-input-panel button {
    background: var(--accent); color: white; border: none;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600;
  }
  .tile.clickable { cursor: pointer; transition: border-color 0.15s; border: 1px solid transparent; }
  .tile.clickable:hover { border-color: var(--accent); }
  .tile.clickable.selected { border-color: var(--accent); background: rgba(139,92,246,0.08); }
  /* Agent output panel */
  #agent-output-panel {
    display: none;
    background: #141420;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 8px 20px;
    max-height: 300px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.5;
  }
  #agent-output-panel.active { display: block; }
  #agent-output-panel .output-header {
    padding: 6px 12px;
    font-weight: 600;
    font-size: 11px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
  }
  #agent-output-content {
    padding: 8px 12px;
    white-space: pre-wrap;
    font-family: inherit;
    color: var(--text);
  }
</style>
</head>
<body>

<header>
  <h1>synapt dashboard</h1>
  <select id="channel-select" hx-get="/api/channels" hx-trigger="load" hx-swap="innerHTML">
    <option value="dev">#dev</option>
  </select>
</header>

<div id="sse-container" hx-ext="sse" sse-connect="/api/stream?channel=dev">
  <div id="agents" sse-swap="agents" hx-swap="innerHTML">
    <div class="tile empty">Loading agents...</div>
  </div>

  <div id="agent-input-panel">
    <span class="agent-target" id="agent-target-label">→ agent</span>
    <input type="text" id="agent-input-text" placeholder="Send input to agent..." autocomplete="off">
    <button id="agent-input-send">Send to Agent</button>
  </div>

  <div id="agent-output-panel">
    <div class="output-header" id="agent-output-header">Terminal: agent</div>
    <div id="agent-output-content">No output yet.</div>
  </div>

  <div id="feed" sse-swap="messages" hx-swap="beforeend">
    <div class="msg sys"><span class="sys-text">Loading messages...</span></div>
  </div>
</div>

<div id="input-bar">
  <form id="post-form"
        hx-post="/api/post/dev"
        hx-encoding="multipart/form-data"
        hx-swap="none"
        hx-on::after-request="this.querySelector('textarea').value = ''; this.querySelector('#attachment-input').value=''; this.querySelector('#attachment-name').textContent='';"
        style="display:flex; gap:8px; flex:1; align-items:flex-end">
    <input type="hidden" name="name" id="post-name" value="dashboard">
    <label class="upload-label" for="attachment-input">Screenshot</label>
    <input id="attachment-input" type="file" name="attachment" accept="image/*" style="display:none">
    <span id="attachment-name"></span>
    <textarea name="message" placeholder="Message #dev... (Shift+Enter for newline)" autocomplete="off" autofocus
              rows="1" style="flex:1; resize:none; background:var(--bg); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:6px; font-family:inherit; font-size:13px; outline:none; max-height:120px; overflow-y:auto"></textarea>
    <button type="submit">Send</button>
  </form>
</div>

<script>
// Dashboard display name — prompt on first load, store in localStorage
let dashName = localStorage.getItem('synapt-dashboard-name');
if (!dashName) {
  dashName = prompt('Enter your display name for the dashboard:', 'Layne') || 'dashboard';
  localStorage.setItem('synapt-dashboard-name', dashName);
}

// Set name in form
document.getElementById('post-name').value = dashName;

function ensureDashboardJoin(channel) {
  return fetch('/api/join/' + channel, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ name: dashName }),
  });
}

ensureDashboardJoin('dev');

// Load initial messages
htmx.ajax('GET', '/api/messages/dev?limit=50', '#feed');

// Populate channel selector
fetch('/api/channels').then(r => r.json()).then(channels => {
  const sel = document.getElementById('channel-select');
  sel.innerHTML = channels.map(c =>
    '<option value="' + c + '"' + (c === 'dev' ? ' selected' : '') + '>#' + c + '</option>'
  ).join('');
});

// Channel switching
document.getElementById('channel-select').addEventListener('change', function() {
  const ch = this.value;
  // Reconnect SSE
  const sse = document.getElementById('sse-container');
  sse.setAttribute('sse-connect', '/api/stream?channel=' + ch);
  htmx.process(sse);
  // Update form
  document.getElementById('post-form').setAttribute('hx-post', '/api/post/' + ch);
  htmx.process(document.getElementById('post-form'));
  // Update placeholder
  document.querySelector('#input-bar textarea').placeholder = 'Message #' + ch + '... (Shift+Enter for newline)';
  ensureDashboardJoin(ch);
  // Reload messages
  document.getElementById('feed').innerHTML = '';
  htmx.ajax('GET', '/api/messages/' + ch + '?limit=50', '#feed');
});

// Enter sends, Shift+Enter adds newline
const textarea = document.querySelector('#input-bar textarea');
const attachmentInput = document.getElementById('attachment-input');
const attachmentName = document.getElementById('attachment-name');
textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (this.value.trim() || attachmentInput.files.length) {
      htmx.trigger(document.getElementById('post-form'), 'submit');
    }
  }
});
attachmentInput.addEventListener('change', function() {
  attachmentName.textContent = this.files.length ? this.files[0].name : '';
});
// Auto-resize textarea
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Convert UTC timestamps to local time
function localizeTimestamps(root) {
  root.querySelectorAll('.ts[data-utc]').forEach(el => {
    const utc = el.getAttribute('data-utc');
    if (!utc || el.dataset.localized) return;
    try {
      const d = new Date(utc.endsWith('Z') ? utc : utc + 'Z');
      if (!isNaN(d)) {
        el.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        el.dataset.localized = '1';
      }
    } catch(e) {}
  });
}
localizeTimestamps(document);

// Auto-scroll feed + localize new timestamps
const feed = document.getElementById('feed');
const observer = new MutationObserver(() => {
  localizeTimestamps(feed);
  feed.scrollTop = feed.scrollHeight;
});
observer.observe(feed, { childList: true, subtree: true });

// Agent input panel — click tile to select agent, send input via API
let selectedAgent = null;
const agentPanel = document.getElementById('agent-input-panel');
const agentLabel = document.getElementById('agent-target-label');
const agentInput = document.getElementById('agent-input-text');
const agentSendBtn = document.getElementById('agent-input-send');

document.getElementById('agents').addEventListener('click', function(e) {
  const tile = e.target.closest('.tile');
  if (!tile || tile.classList.contains('empty')) return;
  const name = tile.dataset.agent;
  if (!name) return;

  // Toggle selection
  document.querySelectorAll('.tile.selected').forEach(t => t.classList.remove('selected'));
  if (selectedAgent === name) {
    selectedAgent = null;
    agentPanel.classList.remove('active');
    return;
  }
  selectedAgent = name;
  tile.classList.add('selected');
  agentLabel.textContent = '→ ' + name;
  agentPanel.classList.add('active');
  agentInput.focus();
});

function sendAgentInput() {
  if (!selectedAgent || !agentInput.value.trim()) return;
  fetch('/api/agent/' + selectedAgent + '/input', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ text: agentInput.value }),
  }).then(r => r.json()).then(data => {
    if (data.ok) agentInput.value = '';
  });
}

agentSendBtn.addEventListener('click', sendAgentInput);
agentInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); sendAgentInput(); }
});

// Agent output panel — shows terminal content when agent is selected
const outputPanel = document.getElementById('agent-output-panel');
const outputHeader = document.getElementById('agent-output-header');
const outputContent = document.getElementById('agent-output-content');
let outputInterval = null;

function showAgentOutput(name) {
  outputHeader.textContent = 'Terminal: ' + name;
  outputPanel.classList.add('active');
  outputContent.textContent = 'Loading...';

  // Poll snapshot every 2 seconds for live updates
  if (outputInterval) clearInterval(outputInterval);
  function fetchSnapshot() {
    fetch('/api/agent/' + name + '/snapshot?lines=40')
      .then(r => r.json())
      .then(data => {
        if (data.content) {
          outputContent.textContent = data.content;
          outputPanel.scrollTop = outputPanel.scrollHeight;
        } else if (data.error) {
          outputContent.textContent = '(' + data.error + ')';
        }
      })
      .catch(() => { outputContent.textContent = '(not connected)'; });
  }
  fetchSnapshot();
  outputInterval = setInterval(fetchSnapshot, 2000);
}

function hideAgentOutput() {
  outputPanel.classList.remove('active');
  if (outputInterval) { clearInterval(outputInterval); outputInterval = null; }
}

// Hook into tile selection — show output when agent selected, hide when deselected
const origClick = document.getElementById('agents').onclick;
document.getElementById('agents').addEventListener('click', function(e) {
  // Wait for the selection handler to run
  setTimeout(function() {
    if (selectedAgent) {
      showAgentOutput(selectedAgent);
    } else {
      hideAgentOutput();
    }
  }, 0);
});
</script>

</body>
</html>
