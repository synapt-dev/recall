<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>synapt dashboard</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #8b5cf6;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ── Header ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: var(--accent); }
  #org-label { font-size: 12px; color: var(--text-dim); }
  #org-label span { color: var(--text); font-weight: 600; }

  /* ── 3-column layout ─────────────────────────────────── */
  .layout {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebars ─────────────────────────────────────────── */
  .sidebar {
    width: 192px;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-left { border-right: 1px solid var(--border); }
  .sidebar-right { border-left: 1px solid var(--border); }

  .sidebar-header {
    padding: 10px 12px 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  /* ── Channel list ─────────────────────────────────────── */
  .ch-project-header {
    padding: 8px 10px 2px;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.7;
  }
  .ch-project-header.active-project { color: var(--accent); opacity: 0.85; }
  .ch-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    margin: 1px 6px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    user-select: none;
    transition: background 0.1s;
  }
  .ch-item:hover { background: rgba(139,92,246,0.1); color: var(--text); }
  .ch-item.active {
    background: rgba(139,92,246,0.18);
    color: var(--accent);
    font-weight: 600;
  }
  .ch-item::before { content: '#'; opacity: 0.5; font-size: 11px; }
  .ch-item.active::before { opacity: 1; color: var(--accent); }

  /* ── New channel button + form ──────────────────────── */
  .new-ch-btn {
    display: block;
    width: calc(100% - 12px);
    margin: 8px 6px 4px;
    padding: 5px 10px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, color 0.15s;
  }
  .new-ch-btn:hover { border-color: var(--accent); color: var(--accent); }
  .new-ch-form {
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 8px 10px;
    margin: 4px 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .new-ch-form.active { display: flex; }
  .new-ch-form select, .new-ch-form input {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }
  .new-ch-form select:focus, .new-ch-form input:focus { border-color: var(--accent); }
  .new-ch-form button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  .new-ch-form button:hover { opacity: 0.9; }

  /* ── Agent tiles (right sidebar) ─────────────────────── */
  #agents { display: flex; flex-direction: column; gap: 0; padding: 4px 6px; }
  .tile {
    background: var(--bg);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .tile-name { font-weight: 600; font-size: 13px; margin-bottom: 1px; }
  .tile-project { color: var(--accent); font-size: 10px; opacity: 0.7; margin-bottom: 2px; }
  .tile-role { color: var(--text-dim); font-size: 11px; margin-bottom: 3px; }
  .tile-meta { color: var(--text-dim); font-size: 11px; line-height: 1.4; }
  .tile.empty { color: var(--text-dim); text-align: center; padding: 16px 10px; }
  .tile.clickable { cursor: pointer; transition: border-color 0.15s; border: 1px solid transparent; }
  .tile.clickable:hover { border-color: var(--accent); }
  .tile.clickable.selected { border-color: var(--accent); background: rgba(139,92,246,0.08); }

  /* ── Main panel ───────────────────────────────────────── */
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Channel header bar ───────────────────────────────── */
  #channel-header {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #channel-header .ch-hash { color: var(--accent); font-size: 15px; }

  /* ── SSE container ────────────────────────────────────── */
  #sse-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* ── Messages ─────────────────────────────────────────── */
  .msg { font-size: 13px; line-height: 1.5; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .msg .ts { color: var(--text-dim); font-size: 12px; }
  .msg b { font-weight: 600; }
  .msg p { margin: 3px 0; }
  .msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 { font-size: 13px; font-weight: 700; margin: 4px 0 2px; }
  .msg code { background: rgba(139,92,246,0.12); padding: 2px 6px; border-radius: 3px; font-size: 12px; color: #c4b5fd; }
  .msg pre { background: #141420; border: 1px solid var(--border); padding: 10px 14px; border-radius: 6px; margin: 6px 0; overflow-x: auto; line-height: 1.5; }
  .msg pre code { padding: 0; background: none; color: var(--text); }
  .msg strong { color: inherit; }
  .msg ul, .msg ol { margin: 6px 0 6px 24px; line-height: 1.6; }
  .msg li { margin: 2px 0; }
  .msg table { border-collapse: collapse; margin: 6px 0; font-size: 12px; width: auto; }
  .msg th, .msg td { border: 1px solid var(--border); padding: 4px 10px; text-align: left; }
  .msg th { background: var(--surface); font-weight: 600; }
  .msg blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 6px 0; color: var(--text-dim); }
  .msg-body { white-space: pre-wrap; word-wrap: break-word; }
  .msg.sys { color: var(--text-dim); font-size: 12px; }
  .msg.sys .sys-text { font-style: italic; }
  .msg.directive b { color: var(--orange); }
  .attachments { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
  .attachment-link { color: var(--accent); text-decoration: none; }
  .attachment-image { max-width: min(420px, 100%); max-height: 320px; display: block; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }

  /* ── Agent input panel ────────────────────────────────── */
  #agent-input-panel {
    display: none;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #agent-input-panel.active { display: flex; gap: 8px; align-items: flex-end; }
  #agent-input-panel .agent-target { font-size: 12px; font-weight: 600; color: var(--accent); white-space: nowrap; align-self: center; }
  #agent-input-panel input[type="text"] {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); padding: 8px 12px;
    border-radius: 6px; font-family: inherit; font-size: 13px; outline: none;
  }
  #agent-input-panel input[type="text"]:focus { border-color: var(--accent); }
  #agent-input-panel button {
    background: var(--accent); color: white; border: none;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600;
  }

  /* ── Agent output panel ───────────────────────────────── */
  #agent-output-panel {
    display: none;
    background: #141420;
    border-top: 1px solid var(--border);
    height: 220px;
    min-height: 120px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.5;
    flex-shrink: 0;
    transition: height 0.2s ease;
    position: relative;
  }
  #agent-output-panel.active { display: block; }
  #agent-output-panel.expanded { height: 50vh; display: flex; flex-direction: column; overflow: hidden; }
  #agent-output-panel.fullscreen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    height: 100vh;
    z-index: 1000;
    border: none;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #agent-output-panel .output-header {
    padding: 5px 16px;
    font-weight: 600;
    font-size: 11px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .output-title { flex: 1; }
  .output-controls { display: flex; gap: 6px; align-items: center; }
  .output-controls button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .output-controls button:hover { color: var(--accent); border-color: var(--accent); }
  #scroll-indicator {
    display: none;
    position: absolute;
    bottom: 8px;
    right: 16px;
    background: var(--accent);
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    z-index: 2;
    opacity: 0.9;
  }
  #scroll-indicator:hover { opacity: 1; }
  #agent-output-content {
    padding: 8px 16px; white-space: pre; font-family: inherit; color: var(--text);
    flex: 1; overflow-y: auto; overflow-x: auto; position: relative;
  }
  #agent-output-content .ansi-line { display: block; min-height: 1.5em; }
  #tmux-cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.2em;
    background: var(--accent);
    opacity: 0.8;
    position: absolute;
    pointer-events: none;
    animation: cursor-blink 1s step-end infinite;
  }
  @keyframes cursor-blink {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0; }
  }
  /* Drop zone overlay for drag-and-drop images */
  .drop-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(139, 92, 246, 0.15);
    border: 2px dashed var(--accent);
    border-radius: 8px;
    z-index: 100;
    pointer-events: none;
    align-items: center;
    justify-content: center;
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay-text {
    background: var(--surface);
    color: var(--accent);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--accent);
  }
  /* Inline input bar — visible only in fullscreen/expanded */
  .output-input-bar {
    display: none;
    gap: 8px;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #agent-output-panel.fullscreen .output-input-bar,
  #agent-output-panel.expanded .output-input-bar { display: flex; }
  .output-input-bar textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    line-height: 1.4;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
  }
  .output-input-bar textarea:focus { border-color: var(--accent); }
  .output-input-bar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
  }
  /* Key palette — always visible when output panel is active */
  .key-palette {
    display: none;
    gap: 4px;
    padding: 6px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
    align-items: center;
  }
  #agent-output-panel.active .key-palette { display: flex; }
  .key-palette .key-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-right: 4px;
    user-select: none;
  }
  .key-palette button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .key-palette button:hover { border-color: var(--accent); color: var(--accent); }
  .key-palette .key-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 4px;
  }

  /* ── Input bar ────────────────────────────────────────── */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .upload-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  #attachment-name {
    color: var(--text-dim);
    font-size: 12px;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    align-self: center;
  }
  #input-bar textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    line-height: 1.4;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
  }
  #input-bar textarea:focus { border-color: var(--accent); }
  #input-bar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #input-bar button:hover { opacity: 0.9; }
</style>
</head>
<body>

<header>
  <h1>mission control</h1>
  <span id="org-label">loading&hellip;</span>
</header>

<div class="layout">

  <!-- Left sidebar: org → project → channels -->
  <div class="sidebar sidebar-left">
    <div class="sidebar-header">Channels</div>
    <div id="channel-list"></div>
    <button class="new-ch-btn" id="new-ch-toggle">+ New Channel</button>
    <div class="new-ch-form" id="new-ch-form">
      <select id="new-ch-target"><option value="">Loading…</option></select>
      <input type="text" id="new-ch-name" placeholder="channel-name" autocomplete="off">
      <button id="new-ch-create">Create</button>
    </div>
  </div>

  <!-- Main panel: messages + input -->
  <div class="main-panel">
    <div id="channel-header">
      <span class="ch-hash">#</span>
      <span id="channel-title">dev</span>
    </div>

    <div id="sse-container">
      <div id="agent-input-panel">
        <span class="agent-target" id="agent-target-label">&rarr; agent</span>
        <input type="text" id="agent-input-text" placeholder="Send input to agent..." autocomplete="off">
        <button id="agent-input-send">Send</button>
      </div>

      <div id="agent-output-panel">
        <div class="output-header" id="agent-output-header">
          <span class="output-title">Terminal: agent</span>
          <div class="output-controls">
            <button id="output-expand-btn" title="Expand panel">expand</button>
            <button id="output-fullscreen-btn" title="Fullscreen">fullscreen</button>
            <button id="output-popout-btn" title="Open in new window">pop out</button>
            <button id="output-close-btn" title="Close">close</button>
          </div>
        </div>
        <div class="drop-overlay" id="drop-overlay"><span class="drop-overlay-text">Drop image to send to agent</span></div>
        <div id="agent-output-content">No output yet.</div>
        <div id="scroll-indicator">new output below</div>
        <div class="key-palette" id="key-palette">
          <span class="key-label">Keys:</span>
          <button data-key="Enter" title="Confirm / select">Enter</button>
          <button data-key="Escape" title="Cancel / dismiss">Esc</button>
          <button data-key="y" title="Yes">y</button>
          <button data-key="n" title="No">n</button>
          <div class="key-sep"></div>
          <button data-key="Up" title="Arrow up">Up</button>
          <button data-key="Down" title="Arrow down">Down</button>
          <button data-key="Tab" title="Tab / next">Tab</button>
          <div class="key-sep"></div>
          <button data-key="C-c" title="Ctrl+C (interrupt)">^C</button>
          <button data-key="C-d" title="Ctrl+D (EOF)">^D</button>
          <button data-key="q" title="Quit">q</button>
        </div>
        <div class="output-input-bar">
          <textarea id="output-inline-input" placeholder="Send to agent... (Shift+Enter for newline)" autocomplete="off" rows="1"></textarea>
          <button id="output-inline-send">Send</button>
        </div>
      </div>

      <div id="feed">
        <div class="msg sys"><span class="sys-text">Loading messages&hellip;</span></div>
      </div>
    </div>

    <div id="input-bar">
      <form id="post-form"
            hx-post="/api/post/dev"
            hx-encoding="multipart/form-data"
            hx-swap="none"
            hx-on::after-request="this.querySelector('textarea').value = ''; this.querySelector('#attachment-input').value=''; this.querySelector('#attachment-name').textContent='';"
            style="display:flex; gap:8px; flex:1; align-items:flex-end">
        <input type="hidden" name="name" id="post-name" value="dashboard">
        <input type="hidden" name="org" id="post-org" value="">
        <input type="hidden" name="project" id="post-project" value="">
        <label class="upload-label" for="attachment-input">&#128247;</label>
        <input id="attachment-input" type="file" name="attachment" accept="image/*" style="display:none">
        <span id="attachment-name"></span>
        <textarea name="message" id="message-input" placeholder="Message #dev&hellip; (Shift+Enter for newline)" autocomplete="off" autofocus rows="1"></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <!-- Right sidebar: org member roster -->
  <div class="sidebar sidebar-right">
    <div class="sidebar-header">Members</div>
    <div id="agents">
      <div class="tile empty">Loading&hellip;</div>
    </div>
  </div>

</div>

<script>
// ── Display name ─────────────────────────────────────────
let dashName = localStorage.getItem('synapt-dashboard-name');
if (!dashName) {
  dashName = prompt('Enter your display name:', 'Layne') || 'dashboard';
  localStorage.setItem('synapt-dashboard-name', dashName);
}
document.getElementById('post-name').value = dashName;

// ── Active channel + org/project context ─────────────────
let activeChannel = 'dev';
let activeOrg = '';
let activeProject = '';

// ── Org/project label + initial context ──────────────────
fetch('/api/org').then(r => r.json()).then(data => {
  activeOrg = data.org || '';
  activeProject = data.project || '';
  document.getElementById('post-org').value = activeOrg;
  document.getElementById('post-project').value = activeProject;
  const lbl = document.getElementById('org-label');
  lbl.innerHTML = '<span>' + data.org + '</span> / ' + data.project;
}).catch(() => {
  document.getElementById('org-label').textContent = '';
});

// ── Channel switching ─────────────────────────────────────
function switchChannel(ch, org, project) {
  activeChannel = ch;
  activeOrg = org || '';
  activeProject = project || '';

  // Update sidebar highlight
  document.querySelectorAll('.ch-item').forEach(el => {
    el.classList.toggle('active',
      el.dataset.ch === ch && el.dataset.org === activeOrg && el.dataset.proj === activeProject);
  });

  // Update channel title
  document.getElementById('channel-title').textContent = ch;

  // Update post form target + hidden org/project fields
  const form = document.getElementById('post-form');
  form.setAttribute('hx-post', '/api/post/' + ch);
  document.getElementById('post-org').value = activeOrg;
  document.getElementById('post-project').value = activeProject;
  htmx.process(form);

  // Update placeholder
  document.getElementById('message-input').placeholder = 'Message #' + ch + '\u2026 (Shift+Enter for newline)';

  // Join the channel
  ensureDashboardJoin(ch);

  // Clear feed and do a full reload for the new channel
  document.getElementById('feed').innerHTML = '';
  loadMessages(true);
}

// ── Nav tree (org → project → channels) ──────────────────
function renderChannelList(nav) {
  const list = document.getElementById('channel-list');
  const projects = (nav && nav.projects) ? nav.projects : [];

  // Seed activeOrg/activeProject from nav on first load
  if (!activeOrg && nav && nav.org) {
    activeOrg = nav.org;
    activeProject = nav.project || '';
  }

  let html = '';
  projects.forEach(p => {
    if (projects.length > 1) {
      const label = (p.org !== nav.org) ? p.org + '/' + p.project : p.project;
      const activeClass = p.active ? ' active-project' : '';
      html += '<div class="ch-project-header' + activeClass + '">' + label + '</div>';
    }
    p.channels.forEach(c => {
      const isActive = (c === activeChannel && p.org === activeOrg && p.project === activeProject);
      html += '<div class="ch-item' + (isActive ? ' active' : '') +
              '" data-ch="' + c + '" data-org="' + p.org + '" data-proj="' + p.project + '">' + c + '</div>';
    });
  });
  if (!html) html = '<div style="padding:8px 10px; font-size:12px; color:var(--text-dim);">No channels</div>';
  list.innerHTML = html;
}

document.getElementById('channel-list').addEventListener('click', function(e) {
  const item = e.target.closest('.ch-item');
  if (item) switchChannel(item.dataset.ch, item.dataset.org, item.dataset.proj);
});

function refreshChannelList() {
  fetch('/api/nav').then(r => r.json()).then(renderChannelList).catch(() => {});
}
refreshChannelList();
setInterval(refreshChannelList, 30000);

// ── New channel form ─────────────────────────────────────
function _populateNewChTargets(nav) {
  const sel = document.getElementById('new-ch-target');
  const projects = (nav && nav.projects) ? nav.projects : [];
  if (!projects.length) { sel.innerHTML = '<option value="">No projects</option>'; return; }
  sel.innerHTML = projects.map(p =>
    '<option value="' + p.org + '/' + p.project + '"' +
    (p.active ? ' selected' : '') + '>' + p.org + '/' + p.project + '</option>'
  ).join('');
}

// Update renderChannelList to also populate the new-channel target select
const _origRenderChannelList = renderChannelList;
renderChannelList = function(nav) {
  _origRenderChannelList(nav);
  _populateNewChTargets(nav);
};

document.getElementById('new-ch-toggle').addEventListener('click', function() {
  const form = document.getElementById('new-ch-form');
  form.classList.toggle('active');
  if (form.classList.contains('active')) {
    document.getElementById('new-ch-name').focus();
  }
});

function createNewChannel() {
  const nameInput = document.getElementById('new-ch-name');
  const raw = nameInput.value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  if (!raw) return;
  const sel = document.getElementById('new-ch-target');
  const parts = (sel.value || '').split('/');
  const org = parts[0] || activeOrg;
  const project = parts[1] || activeProject;
  // Channels auto-create on first post — just switch to the new name
  switchChannel(raw, org, project);
  nameInput.value = '';
  document.getElementById('new-ch-form').classList.remove('active');
  // Force a nav refresh so the new channel appears in sidebar after first message
  setTimeout(refreshChannelList, 1000);
}

document.getElementById('new-ch-create').addEventListener('click', createNewChannel);
document.getElementById('new-ch-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); createNewChannel(); }
  if (e.key === 'Escape') { document.getElementById('new-ch-form').classList.remove('active'); }
});

// ── Message polling (replaces SSE — clean channel switching) ──
// On switch, clears feed and does a full load (limit=50, no since).
// Every 2s it reads the last timestamp from the DOM and fetches only newer messages.
function _lastFeedTs() {
  const spans = document.getElementById('feed').querySelectorAll('.ts[data-utc]');
  return spans.length ? (spans[spans.length - 1].getAttribute('data-utc') || '') : '';
}

async function loadMessages(full) {
  const q = new URLSearchParams();
  if (full) {
    q.set('limit', '50');
  } else {
    const ts = _lastFeedTs();
    if (!ts) return; // nothing loaded yet, wait for full load
    q.set('since', ts);
  }
  if (activeOrg) q.set('org', activeOrg);
  if (activeProject) q.set('project', activeProject);
  try {
    const res = await fetch('/api/messages/' + activeChannel + '?' + q.toString());
    if (!res.ok) return;
    const html = await res.text();
    if (!html.trim()) return;
    const feed = document.getElementById('feed');
    if (full) { feed.innerHTML = html; } else { feed.insertAdjacentHTML('beforeend', html); }
  } catch(e) {}
}

ensureDashboardJoin('dev');
loadMessages(true);
setInterval(() => loadMessages(false), 2000);

// ── Agents polling (right sidebar — polled, not SSE) ─────
// #agents is outside #sse-container so sse-swap won't fire here.
const _statusColors = { online: '#4ade80', running: '#4ade80', idle: '#facc15', away: '#fb923c', offline: '#6b7280' };

function renderAgents(agents) {
  const container = document.getElementById('agents');
  if (!agents || !agents.length) {
    container.innerHTML = '<div class="tile empty">No agents online</div>';
    return;
  }
  container.innerHTML = agents.map(a => {
    const name = a.display_name || a.griptree || a.agent_id || '?';
    const color = _statusColors[a.status] || '#6b7280';
    const role = (a.role && a.role !== 'agent') ? '<div class="tile-role">' + a.role + '</div>' : '';
    const project = a.griptree ? '<div class="tile-project">' + a.griptree + '</div>' : '';
    const channels = (a.channels && a.channels.length) ? a.channels.map(c => '#' + c).join(', ') : 'no channels';
    const seen = (a.last_seen && a.last_seen.length > 16) ? a.last_seen.substring(11, 16) : '';
    const isSel = (selectedAgent === name) ? ' selected' : '';
    return '<div class="tile clickable' + isSel + '" data-agent="' + name + '" style="border-left:4px solid ' + color + '">' +
           '<div class="tile-name">' + name + '</div>' + project + role +
           '<div class="tile-meta"><span style="color:' + color + '">' + a.status + '</span>' +
           ' &middot; ' + channels + (seen ? ' &middot; ' + seen : '') + '</div></div>';
  }).join('');
}

function refreshAgents() {
  fetch('/api/agents').then(r => r.json()).then(renderAgents).catch(() => {});

// ── Timestamp localization ────────────────────────────────
function localizeTimestamps(root) {
  root.querySelectorAll('.ts[data-utc]').forEach(el => {
    const utc = el.getAttribute('data-utc');
    if (!utc || el.dataset.localized) return;
    try {
      const d = new Date(utc.endsWith('Z') ? utc : utc + 'Z');
      if (!isNaN(d)) {
        el.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        el.dataset.localized = '1';
      }
    } catch(e) {}
  });
}
localizeTimestamps(document);

});

// Map browser key names to tmux key names for forwarding
const _KEY_MAP = {
  ArrowUp: 'Up', ArrowDown: 'Down', ArrowLeft: 'Left', ArrowRight: 'Right',
  Escape: 'Escape', Tab: 'Tab', Enter: 'Enter',
};

// Forward special keys to agent when input field is empty
function handleInputKeydown(inputEl, e) {
  if (!selectedAgent) return false;
  var tmuxKey = _KEY_MAP[e.key];
  // If field is empty and key is mappable, forward to agent
  if (tmuxKey && !inputEl.value.trim()) {
    // Enter on empty field = bare Enter (confirm selection)
    if (e.key === 'Enter') {
      e.preventDefault();
      fetch('/api/agent/' + selectedAgent + '/input', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ text: '' }),
      }).then(function() { setTimeout(refreshOutputNow, 150); });
      return true;
    }
    // Arrow keys, Escape, Tab on empty field = send raw key
    e.preventDefault();
    sendKey(tmuxKey);  // sendKey already triggers refreshOutputNow
    return true;
  }
  return false;
}

function sendAgentInput() {
  if (!selectedAgent || !agentInput.value.trim()) return;
  fetch('/api/agent/' + selectedAgent + '/input', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ text: agentInput.value }),
  }).then(r => r.json()).then(data => {
    if (data.ok) agentInput.value = '';
  });
}
agentSendBtn.addEventListener('click', sendAgentInput);
agentInput.addEventListener('keydown', function(e) {
  if (handleInputKeydown(agentInput, e)) return;
  if (e.key === 'Enter') { e.preventDefault(); sendAgentInput(); }
});

// ── Inline ANSI-to-HTML parser ────────────────────────────
// Handles SGR sequences: colors (standard, 256, RGB), bold, dim, underline, reset
var _ANSI_COLORS = [
  '#000','#c00','#0a0','#aa0','#55f','#a0a','#0aa','#aaa',  // 30-37
  '#555','#f55','#5f5','#ff5','#55f','#f5f','#5ff','#fff',  // 90-97
];
function _ansi256(n) {
  if (n < 8) return _ANSI_COLORS[n];
  if (n < 16) return _ANSI_COLORS[n - 8 + 8];
  if (n < 232) {
    n -= 16; var b = n % 6, g = ((n - b) / 6) % 6, r = ((n - b - g * 6) / 36);
    return 'rgb(' + [r && r*40+55, g && g*40+55, b && b*40+55].join(',') + ')';
  }
  var v = (n - 232) * 10 + 8;
  return 'rgb(' + v + ',' + v + ',' + v + ')';
}
function _escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function ansiToHtml(text) {
  var result = '', style = {}, open = false;
  // Split on ANSI escape sequences
  var parts = text.split(/(\x1b\[[0-9;]*m)/);
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i];
    var m = p.match(/^\x1b\[([\d;]*)m$/);
    if (m) {
      var codes = m[1] ? m[1].split(';').map(Number) : [0];
      for (var j = 0; j < codes.length; j++) {
        var c = codes[j];
        if (c === 0) { style = {}; }
        else if (c === 1) { style.bold = true; }
        else if (c === 2) { style.dim = true; }
        else if (c === 3) { style.italic = true; }
        else if (c === 4) { style.underline = true; }
        else if (c === 22) { delete style.bold; delete style.dim; }
        else if (c === 23) { delete style.italic; }
        else if (c === 24) { delete style.underline; }
        else if (c >= 30 && c <= 37) { style.fg = _ANSI_COLORS[c - 30]; }
        else if (c === 38) {
          if (codes[j+1] === 5 && codes[j+2] !== undefined) { style.fg = _ansi256(codes[j+2]); j += 2; }
          else if (codes[j+1] === 2 && codes[j+4] !== undefined) { style.fg = 'rgb('+codes[j+2]+','+codes[j+3]+','+codes[j+4]+')'; j += 4; }
        }
        else if (c === 39) { delete style.fg; }
        else if (c >= 40 && c <= 47) { style.bg = _ANSI_COLORS[c - 40]; }
        else if (c === 48) {
          if (codes[j+1] === 5 && codes[j+2] !== undefined) { style.bg = _ansi256(codes[j+2]); j += 2; }
          else if (codes[j+1] === 2 && codes[j+4] !== undefined) { style.bg = 'rgb('+codes[j+2]+','+codes[j+3]+','+codes[j+4]+')'; j += 4; }
        }
        else if (c === 49) { delete style.bg; }
        else if (c >= 90 && c <= 97) { style.fg = _ANSI_COLORS[c - 90 + 8]; }
        else if (c >= 100 && c <= 107) { style.bg = _ANSI_COLORS[c - 100 + 8]; }
      }
      continue;
    }
    if (!p) continue;
    var css = '';
    if (style.fg) css += 'color:' + style.fg + ';';
    if (style.bg) css += 'background:' + style.bg + ';';
    if (style.bold) css += 'font-weight:700;';
    if (style.dim) css += 'opacity:0.6;';
    if (style.italic) css += 'font-style:italic;';
    if (style.underline) css += 'text-decoration:underline;';
    if (css) {
      result += '<span style="' + css + '">' + _escHtml(p) + '</span>';
    } else {
      result += _escHtml(p);
    }
  }
  return result;
}

function renderAnsiContent(data) {
  if (!data.content) return;
  var lines = data.content.split('\n');
  var html = '';
  for (var i = 0; i < lines.length; i++) {
    html += '<span class="ansi-line" data-line="' + i + '">' +
            ansiToHtml(lines[i]) + '</span>\n';
  }
  outputContent.innerHTML = html;
  if (typeof data.cursor_x === 'number' && typeof data.cursor_y === 'number') {
    positionCursor(data.cursor_x, data.cursor_y, data.pane_height || 50);
  }
}

function positionCursor(cx, cy, paneHeight) {
  var existing = document.getElementById('tmux-cursor');
  if (existing) existing.remove();
  var lines = outputContent.querySelectorAll('.ansi-line');
  var totalLines = lines.length;
  var targetLine = totalLines - paneHeight + cy;
  if (targetLine < 0 || targetLine >= totalLines) return;
  var line = lines[targetLine];
  if (!line) return;
  var cursor = document.createElement('span');
  cursor.id = 'tmux-cursor';
  var charWidth = 7.2; // monospace char width at 12px
  cursor.style.left = (16 + cx * charWidth) + 'px';
  cursor.style.top = line.offsetTop + 'px';
  outputContent.appendChild(cursor);
}

// Immediate snapshot refresh after interaction
function refreshOutputNow() {
  if (!selectedAgent) return;
  fetch('/api/agent/' + selectedAgent + '/snapshot?lines=80&ansi=true')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.content) {
        renderAnsiContent(data);
        outputPanel.scrollTop = outputPanel.scrollHeight;
      }
    }).catch(function() {});
}

  if (!selectedAgent) return;
  fetch('/api/agent/' + selectedAgent + '/key', {

    body: new URLSearchParams({ key: keyName }),
  }).then(function() {
    // Refresh after a brief delay to let the terminal redraw
    setTimeout(refreshOutputNow, 150);
  });
}

// Close output panel
document.getElementById('output-close-btn').addEventListener('click', function() {
  hideAgentOutput();
  selectedAgent = null;
  document.querySelectorAll('.tile.selected').forEach(t => t.classList.remove('selected'));
  agentPanel.classList.remove('active');
});

// Escape key exits fullscreen
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && outputPanel.classList.contains('fullscreen')) {
    outputPanel.classList.remove('fullscreen');
    document.getElementById('output-fullscreen-btn').textContent = 'fullscreen';
  }
});

// ── Drag-and-drop image upload to agent ──────────────────
var dropOverlay = document.getElementById('drop-overlay');
var dragCounter = 0;

outputPanel.addEventListener('dragenter', function(e) {
  e.preventDefault();
  dragCounter++;
  if (selectedAgent && e.dataTransfer.types.indexOf('Files') !== -1) {
    dropOverlay.classList.add('active');
  }
});

outputPanel.addEventListener('dragleave', function(e) {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('active');
  }
});

outputPanel.addEventListener('dragover', function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

outputPanel.addEventListener('drop', function(e) {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');
  if (!selectedAgent || !e.dataTransfer.files.length) return;
  var file = e.dataTransfer.files[0];
  var formData = new FormData();
  formData.append('file', file);
  dropOverlay.querySelector('.drop-overlay-text').textContent = 'Uploading ' + file.name + '...';
  dropOverlay.classList.add('active');
  fetch('/api/agent/' + selectedAgent + '/upload', {
    method: 'POST',
    body: formData,
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    dropOverlay.classList.remove('active');
    dropOverlay.querySelector('.drop-overlay-text').textContent = 'Drop image to send to agent';
    if (d.ok) {
      setTimeout(refreshOutputNow, 150);
    }
  })
  .catch(function() {
    dropOverlay.classList.remove('active');
    dropOverlay.querySelector('.drop-overlay-text').textContent = 'Drop image to send to agent';
  });
});

function showAgentOutput(name) {
  outputTitle.textContent = 'Terminal: ' + name;
  outputPanel.classList.add('active');
  outputPanel.classList.remove('expanded', 'fullscreen');
  document.getElementById('output-expand-btn').textContent = 'expand';
  document.getElementById('output-fullscreen-btn').textContent = 'fullscreen';
  outputContent.textContent = 'Loading\u2026';
  userScrolledUp = false;
  scrollIndicator.style.display = 'none';
  if (outputInterval) clearInterval(outputInterval);
  function fetchSnapshot() {
    fetch('/api/agent/' + name + '/snapshot?lines=80&ansi=true')
      .then(r => r.json())
      .then(data => {
        if (data.content) {
          const wasAtBottom = !userScrolledUp;
          renderAnsiContent(data);
          if (wasAtBottom) {
            outputPanel.scrollTop = outputPanel.scrollHeight;
          } else {
            scrollIndicator.style.display = 'block';
          }
        } else if (data.error) {
          outputContent.textContent = '(' + data.error + ')';
        }
      })
      .catch(() => { outputContent.textContent = '(not connected)'; });
  }
  fetchSnapshot();
  outputInterval = setInterval(fetchSnapshot, 2000);
}

function hideAgentOutput() {
  outputPanel.classList.remove('active', 'expanded', 'fullscreen');
  if (outputInterval) { clearInterval(outputInterval); outputInterval = null; }
}
