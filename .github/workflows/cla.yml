name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".github/contributors/cla-signatures.json"
          path-to-document: "https://github.com/laynepenney/synapt/blob/main/CLA.md"
          branch: "main"
          allowlist: dependabot[bot],renovate[bot],github-actions[bot]
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, we need you to sign our [Contributor License Agreement](https://github.com/laynepenney/synapt/blob/main/CLA.md).

            To sign, please comment on this PR with the following exact text:

            > I have read the CLA Document and I hereby sign the CLA

            You can also re-trigger the CLA check by commenting `recheck`.
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you!
